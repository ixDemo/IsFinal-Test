<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1e3c;
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --cream: #fdf8f0;
    --white: #ffffff;
    --gray: #6b7280;
    --light-gray: #f3f4f6;
    --correct: #16a34a;
    --wrong: #dc2626;
    --border: #e5e0d5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--navy);
    min-height: 100vh;
  }

  header {
    background: var(--navy);
    color: var(--white);
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(201,168,76,0.05) 30px, rgba(201,168,76,0.05) 31px);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: -0.5px;
    position: relative;
  }
  header .subtitle {
    margin-top: 8px;
    color: var(--gold-light);
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
  }
  .gold-bar {
    width: 60px; height: 3px;
    background: var(--gold);
    margin: 16px auto 0;
    position: relative;
  }

  .exam-meta {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    padding: 16px 24px;
    background: var(--navy);
    border-top: 1px solid rgba(201,168,76,0.3);
  }
  .meta-item {
    color: rgba(255,255,255,0.7);
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .meta-item span { color: var(--gold-light); font-weight: 600; }

  .progress-bar-wrap {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 8px;
    background: var(--light-gray);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 999px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.8rem;
    color: var(--gray);
    white-space: nowrap;
    font-weight: 600;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;
  }
  .section-badge {
    background: var(--navy);
    color: var(--gold-light);
    font-family: 'Playfair Display', serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 4px;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--navy);
  }

  .question-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 16px;
    transition: box-shadow 0.2s;
  }
  .question-card:hover { box-shadow: 0 4px 16px rgba(15,30,60,0.08); }
  .question-card.answered-correct { border-left: 4px solid var(--correct); }
  .question-card.answered-wrong { border-left: 4px solid var(--wrong); }

  .q-number {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .q-text {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.55;
    color: var(--navy);
    margin-bottom: 16px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--cream);
    cursor: pointer;
    text-align: left;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.92rem;
    color: var(--navy);
    transition: all 0.15s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: #fdf3d9;
  }
  .option-btn .opt-label {
    font-weight: 700;
    color: var(--gold);
    min-width: 20px;
    font-size: 0.85rem;
  }
  .option-btn.correct {
    border-color: var(--correct);
    background: #f0fdf4;
    color: var(--correct);
  }
  .option-btn.correct .opt-label { color: var(--correct); }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: #fff5f5;
    color: var(--wrong);
  }
  .option-btn.wrong .opt-label { color: var(--wrong); }
  .option-btn.reveal-correct {
    border-color: var(--correct);
    background: #f0fdf4;
    color: var(--correct);
    opacity: 0.7;
  }
  .option-btn:disabled { cursor: default; }

  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    display: none;
  }
  .feedback.correct { background: #f0fdf4; color: var(--correct); display: block; }
  .feedback.wrong { background: #fff5f5; color: var(--wrong); display: block; }

  /* True/False specific */
  .tf-buttons { display: flex; gap: 10px; }
  .tf-btn {
    flex: 1;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--cream);
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .tf-btn:hover:not(:disabled) { border-color: var(--gold); background: #fdf3d9; }
  .tf-btn.correct { border-color: var(--correct); background: #f0fdf4; color: var(--correct); }
  .tf-btn.wrong { border-color: var(--wrong); background: #fff5f5; color: var(--wrong); }
  .tf-btn:disabled { cursor: default; }

  .score-panel {
    background: var(--navy);
    color: var(--white);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    margin-top: 48px;
    display: none;
  }
  .score-panel h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  .score-big {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
  }
  .score-sub { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 8px; }
  .grade-badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 999px;
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 16px;
    letter-spacing: 1px;
  }

  .submit-btn {
    display: block;
    margin: 40px auto 0;
    padding: 14px 48px;
    background: var(--navy);
    color: var(--gold-light);
    border: none;
    border-radius: 8px;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .submit-btn:hover { background: #1a3060; }

  .chapter-tag {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray);
    background: var(--light-gray);
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>Final Examination</h1>
  <p class="subtitle">Information Systems &amp; Professional Skills</p>
  <div class="gold-bar"></div>
</header>
<div class="exam-meta">
  <div class="meta-item">Questions: <span>60</span></div>
  <div class="meta-item">MCQ: <span>40</span></div>
  <div class="meta-item">True / False: <span>20</span></div>
  <div class="meta-item">Chapters: <span>5, 6, 9, 12, 13</span></div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 60 answered</div>
</div>

<div class="container" id="examContainer"></div>

<div class="score-panel" id="scorePanel">
  <h2>Exam Complete</h2>
  <div class="score-big" id="scoreBig"></div>
  <div class="score-sub" id="scoreSub"></div>
  <div class="grade-badge" id="gradeBadge"></div>
</div>

<script>
const questions = [

   q:'In batch processing, what is the essential characteristic that distinguishes it from online processing?',
   opts:['Immediate data update','Real-time access','A delay between an event and processing','Higher security'], ans:2},
  {type:'mcq', chapter:'Ch.5 – E-Commerce & Enterprise Systems',
   q:'Which payment card stores encrypted facts about the cardholder on an embedded microchip?',

  {type:'mcq', chapter:'Ch.5 – E-Commerce & Enterprise Systems',
   q:'The transaction processing cycle begins with which activity?',
   opts:['Data storage','Data editing','Data collection','Document production'], ans:2},
  {type:'mcq', chapter:'Ch.5 – E-Commerce & Enterprise Systems',
   q:'Worldwide, m-commerce accounted for approximately what percentage of all retail e-commerce sales in Q4 2015?',
   opts:['15%','25%','35%','50%'], ans:2},

  // ─── CHAPTER 6 — MCQ ───
  {type:'mcq', chapter:'Ch.6 – Business Intelligence & Analytics',
   q:'Business analytics is best described as:',
   opts:['Storing large amounts of data in warehouses','Extensive use of data and quantitative analysis to support fact-based decision making','Automating transaction processing','Managing customer relationships'], ans:1},
  {type:'mcq', chapter:'Ch.6 – Business Intelligence & Analytics',
   q:'A large collection of data built from multiple sources for BI is commonly called a:',

  {type:'mcq', chapter:'Ch.9 – Soft Skills',

  {type:'mcq', chapter:'Ch.9 – Soft Skills',
   q:'Which soft skill directly contributes to meeting deadlines, reduced stress, and improved work-life balance?',
   opts:['Leadership','Emotional intelligence','Time management and organization','Teamwork'], ans:2},
  {type:'mcq', chapter:'Ch.9 – Soft Skills',
   q:'Shared decision-making and providing constructive feedback are examples of:',

  {type:'mcq', chapter:'Ch.9 – Soft Skills',
   q:'Reliability, integrity, and a commitment to excellence describe which soft skill?',
   opts:['Adaptability','Emotional intelligence','Communication','Professionalism and work ethic'], ans:3},
  {type:'mcq', chapter:'Ch.9 – Soft Skills',
   q:'To improve leadership skills, one effective approach is to:',
   opts:['Avoid delegation to maintain control','Seek feedback from colleagues and learn from successful leaders','Focus solely on technical skills','Limit communication to formal channels'], ans:1},

  // ─── CHAPTER 12 — MCQ ───
  {type:'mcq', chapter:'Ch.12 – Systems Development: Investigation, Analysis & Design',
   q:'A person assigned by the organization to do the work of a project and achieve its objectives is called a:',
   opts:['Stakeholder','Systems analyst','Project manager','Programmer'], ans:2},
  {type:'mcq', chapter:'Ch.12 – Systems Development: Investigation, Analysis & Design',
   q:'People who will regularly interact with a new information system are called:',
   opts:['Stakeholders','Managers','Users','Programmers'], ans:2},

   q:'The traditional SDLC is best described as:',
   opts:['An iterative, sprint-based process','A sequential multistage process where each stage must be approved before the next begins','A rapid prototyping approach','An end-user development model'], ans:1},
  {type:'mcq', chapter:'Ch.12 – Systems Development: Investigation, Analysis & Design',
   q:'Critical success factors (CSFs) are:',
   opts:['Budget estimates for IS projects','Factors essential to the success of a functional area','Hardware specifications','Security protocols'], ans:1},
  {type:'mcq', chapter:'Ch.12 – Systems Development: Investigation, Analysis & Design',
   q:'A structured meeting process that accelerates the investigation, analysis, and design phases is called:',
   opts:['SDLC','JAD (Joint Application Development)','Agile sprint','Unit testing'], ans:1},
  {type:'mcq', chapter:'Ch.12 – Systems Development: Investigation, Analysis & Design',
   q:'Which team member specializes in analyzing and designing business systems?',
   opts:['Project sponsor','Programmer','Systems analyst','Steering team member'], ans:2},
  {type:'mcq', chapter:'Ch.12 – Systems Development: Investigation, Analysis & Design',
   q:'The project sponsor is important because lack of this person:',
   opts:['Reduces coding speed','Raises the distinct probability of project failure','Increases testing time','Lowers hardware costs'], ans:1},
  {type:'mcq', chapter:'Ch.12 – Systems Development: Investigation, Analysis & Design',
   q:'A disadvantage of the traditional SDLC approach is:',
   opts:['Lack of formal documentation','Users may get a system that does not meet their real needs','No management control checkpoints','Too few intermediate products'], ans:1},

  {type:'mcq', chapter:'Ch.13 – Systems Development: Construction to Disposal',
   q:'Which type of testing links all individual components and tests them as a group?',

   q:'Which of the following is a common cause of IS project failure?',

   q:'End-user systems development refers to:',
   opts:['IT professionals building enterprise applications','Nonprofessional developers creating or modifying software','Third-party vendors delivering SaaS','Automated code generation by AI'], ans:1},

   q:'The phase-in approach to cutover involves:',
   opts:['Switching all users at once','Running both old and new systems simultaneously indefinitely','Slowly phasing in new components as old ones are phased out','Running the new system for one group only'], ans:2},

  // ─── TRUE / FALSE ───
  {type:'tf', chapter:'Ch.5 – E-Commerce & Enterprise Systems',
   q:'In C2C e-commerce, transactions are typically worth thousands or millions of dollars.',
   ans:false},
  {type:'tf', chapter:'Ch.5 – E-Commerce & Enterprise Systems',
   q:'Online Transaction Processing (OLTP) processes transactions immediately, so data always reflects the current status.',

  {type:'tf', chapter:'Ch.5 – E-Commerce & Enterprise Systems',
   q:'A digital certificate is issued directly by the buyer to verify the identity of an online seller.',

let answered = 0;
const total = questions.length;
const userAnswers = new Array(total).fill(null);

function buildExam() {
  const container = document.getElementById('examContainer');

  // Group by section
  const sections = [
    { label: 'Part I — Multiple Choice Questions', filter: q => q.type === 'mcq' },
    { label: 'Part II — True or False', filter: q => q.type === 'tf' },
  ];

  let globalIdx = 0;
  sections.forEach(sec => {
    const qs = questions.map((q,i) => ({...q, idx: i})).filter(q => sec.filter(q));

    const secDiv = document.createElement('div');

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<div class="section-line"></div><div class="section-badge">${sec.label}</div><div class="section-line"></div>`;
    secDiv.appendChild(hdr);

    qs.forEach((q, localI) => {
      globalIdx++;
      secDiv.appendChild(buildCard(q, globalIdx));
    });

    container.appendChild(secDiv);
  });

  const btn = document.createElement('button');
  btn.className = 'submit-btn';
  btn.textContent = 'Submit Exam';
  btn.onclick = showResults;
  container.appendChild(btn);
}

function buildCard(q, displayNum) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = `card-${q.idx}`;

  card.innerHTML = `
    <div class="chapter-tag">${q.chapter}</div>
    <div class="q-number">Question ${displayNum}</div>
    <div class="q-text">${q.q}</div>
  `;

  if (q.type === 'mcq') {
    const opts = document.createElement('div');
    opts.className = 'options';
    const labels = ['A','B','C','D'];
    q.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.dataset.qi = q.idx;
      btn.dataset.oi = oi;
      btn.innerHTML = `<span class="opt-label">${labels[oi]}</span> ${opt}`;
      btn.onclick = () => selectMCQ(q.idx, oi, q.ans, card);
      opts.appendChild(btn);
    });
    card.appendChild(opts);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'tf-buttons';
    ['True','False'].forEach(val => {
      const btn = document.createElement('button');
      btn.className = 'tf-btn';
      btn.textContent = val;
      btn.dataset.qi = q.idx;
      btn.onclick = () => selectTF(q.idx, val === 'True', q.ans, card);
      wrap.appendChild(btn);
    });
    card.appendChild(wrap);
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.id = `fb-${q.idx}`;
  card.appendChild(fb);

  return card;
}

function selectMCQ(qi, selected, correct, card) {
  if (userAnswers[qi] !== null) return;
  userAnswers[qi] = selected;
  answered++;
  updateProgress();

  const btns = card.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = selected === correct;
  btns[selected].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[correct].classList.add('reveal-correct');

  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  const fb = document.getElementById(`fb-${qi}`);
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? '✓ Correct!' : '✗ Incorrect. The correct answer is highlighted above.';
}

function selectTF(qi, selected, correct, card) {
  if (userAnswers[qi] !== null) return;
  userAnswers[qi] = selected;
  answered++;
  updateProgress();

  const btns = card.querySelectorAll('.tf-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = selected === correct;
  // True = btns[0], False = btns[1]
  const selectedBtn = selected ? btns[0] : btns[1];
  const correctBtn = correct ? btns[0] : btns[1];

  selectedBtn.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) correctBtn.classList.add('correct');

  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  const fb = document.getElementById(`fb-${qi}`);
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? '✓ Correct!' : `✗ Incorrect. The correct answer is ${correct ? 'True' : 'False'}.`;
}

function updateProgress() {
  const pct = (answered / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${answered} / ${total} answered`;
}

function showResults() {
  let score = 0;
  questions.forEach((q, i) => {
    if (userAnswers[i] === q.ans) score++;
  });
  const pct = Math.round((score / total) * 100);

  let grade, color;
  if (pct >= 90) { grade = 'A — Excellent'; color = '#16a34a'; }
  else if (pct >= 80) { grade = 'B — Good'; color = '#2563eb'; }
  else if (pct >= 70) { grade = 'C — Satisfactory'; color = '#d97706'; }
  else if (pct >= 60) { grade = 'D — Needs Improvement'; color = '#ea580c'; }
  else { grade = 'F — Unsatisfactory'; color = '#dc2626'; }

  const panel = document.getElementById('scorePanel');
  panel.style.display = 'block';
  document.getElementById('scoreBig').textContent = pct + '%';
  document.getElementById('scoreSub').textContent = `You answered ${score} out of ${total} questions correctly.`;
  const badge = document.getElementById('gradeBadge');
  badge.textContent = grade;
  badge.style.background = color;
  badge.style.color = '#fff';

  panel.scrollIntoView({ behavior: 'smooth' });
}

buildExam();
</script>
</body>
