<style>

  .option-btn.wrong { border-color: var(--wrong); background: #fff5f5; color: var(--wrong); }

  .option-btn.reveal-correct { border-color: var(--correct); background: #f0fdf4; color: var(--correct); opacity: 0.75; }

  .tf-btn.correct { border-color: var(--correct); background: #f0fdf4; color: var(--correct); }
  .tf-btn.wrong { border-color: var(--wrong); background: #fff5f5; color: var(--wrong); }
  .tf-btn:disabled { cursor: default; }

  .feedback.correct { background: #f0fdf4; color: var(--correct); display: block; }
  .feedback.wrong { background: #fff5f5; color: var(--wrong); display: block; }

  .score-panel { background: var(--navy); color: var(--white); border-radius: 12px; padding: 32px; text-align: center; margin-top: 48px; display: none; }
  .score-panel h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 8px; }
  .score-big { font-family: 'Playfair Display', serif; font-size: 4rem; font-weight: 900; color: var(--gold-light); line-height: 1; }
  .score-sub { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 8px; }
  .score-breakdown { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-top: 20px; }
  .score-item { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 12px 20px; }
  .score-item .val { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: var(--gold-light); }
  .score-item .lbl { font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
  .grade-badge { display: inline-block; padding: 6px 20px; border-radius: 999px; font-size: 1.1rem; font-weight: 700; margin-top: 16px; letter-spacing: 1px; }

  @media(max-width:600px) { .chapter-num { font-size: 1.4rem; } .score-big { font-size: 3rem; } }
</style>

let answered = 0;
const total = questions.length;
const userAnswers = new Array(total).fill(null);

function buildExam() {
  const container = document.getElementById('examContainer');

  // MCQ section
  const mcqDiv = document.createElement('div');
  const mcqHdr = document.createElement('div');
  mcqHdr.className = 'section-header';
  mcqHdr.innerHTML = `<div class="section-line"></div><div class="section-badge">Part I — Multiple Choice Questions (120)</div><div class="section-line"></div>`;
  mcqDiv.appendChild(mcqHdr);

  const mcqs = questions.map((q,i)=>({...q,idx:i})).filter(q=>q.type==='mcq');
  let currentCh = null, dispNum = 0;
  mcqs.forEach(q => {
    dispNum++;
    if (q.ch !== currentCh) {
      currentCh = q.ch;
      const chHdr = document.createElement('div');
      chHdr.className = 'chapter-header';
      chHdr.innerHTML = `<div class="chapter-num">${q.ch}</div><div class="chapter-info"><h3>${q.chTitle}</h3><p>Chapter ${q.ch}</p></div>`;
      mcqDiv.appendChild(chHdr);
    }
    mcqDiv.appendChild(buildCard(q, dispNum));
  });
  container.appendChild(mcqDiv);

  // T/F section
  const tfDiv = document.createElement('div');
  const tfHdr = document.createElement('div');
  tfHdr.className = 'section-header';
  tfHdr.innerHTML = `<div class="section-line"></div><div class="section-badge">Part II — True or False (30)</div><div class="section-line"></div>`;
  tfDiv.appendChild(tfHdr);

  const tfs = questions.map((q,i)=>({...q,idx:i})).filter(q=>q.type==='tf');
  currentCh = null;
  tfs.forEach(q => {
    dispNum++;
    if (q.ch !== currentCh) {
      currentCh = q.ch;
      const chHdr = document.createElement('div');
      chHdr.className = 'chapter-header';
      chHdr.innerHTML = `<div class="chapter-num">${q.ch}</div><div class="chapter-info"><h3>${q.chTitle}</h3><p>Chapter ${q.ch}</p></div>`;
      tfDiv.appendChild(chHdr);
    }
    tfDiv.appendChild(buildCard(q, dispNum));
  });
  container.appendChild(tfDiv);

  const btn = document.createElement('button');
  btn.className = 'submit-btn';
  btn.textContent = 'Submit Exam';
  btn.onclick = showResults;
  container.appendChild(btn);
}

function buildCard(q, displayNum) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = `card-${q.idx}`;
  card.innerHTML = `<div class="q-number">Question ${displayNum}</div><div class="q-text">${q.q}</div>`;

  if (q.type === 'mcq') {
    const opts = document.createElement('div');
    opts.className = 'options';
    ['A','B','C','D'].forEach((lbl, oi) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="opt-label">${lbl}</span>${q.opts[oi]}`;
      btn.onclick = () => selectMCQ(q.idx, oi, q.ans, card);
      opts.appendChild(btn);
    });
    card.appendChild(opts);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'tf-buttons';
    ['True','False'].forEach(val => {
      const btn = document.createElement('button');
      btn.className = 'tf-btn';
      btn.textContent = val;
      btn.onclick = () => selectTF(q.idx, val==='True', q.ans, card);
      wrap.appendChild(btn);
    });
    card.appendChild(wrap);
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.id = `fb-${q.idx}`;
  card.appendChild(fb);
  return card;
}

function selectMCQ(qi, selected, correct, card) {
  if (userAnswers[qi] !== null) return;
  userAnswers[qi] = selected; answered++; updateProgress();
  const btns = card.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const ok = selected === correct;
  btns[selected].classList.add(ok ? 'correct' : 'wrong');
  if (!ok) btns[correct].classList.add('reveal-correct');
  card.classList.add(ok ? 'answered-correct' : 'answered-wrong');
  const fb = document.getElementById(`fb-${qi}`);
  fb.className = 'feedback ' + (ok ? 'correct' : 'wrong');
  fb.textContent = ok ? '✓ Correct!' : '✗ Incorrect. The correct answer is highlighted above.';
}

function selectTF(qi, selected, correct, card) {
  if (userAnswers[qi] !== null) return;
  userAnswers[qi] = selected; answered++; updateProgress();
  const btns = card.querySelectorAll('.tf-btn');
  btns.forEach(b => b.disabled = true);
  const ok = selected === correct;
  const selBtn = selected ? btns[0] : btns[1];
  const corBtn = correct ? btns[0] : btns[1];
  selBtn.classList.add(ok ? 'correct' : 'wrong');
  if (!ok) corBtn.classList.add('correct');
  card.classList.add(ok ? 'answered-correct' : 'answered-wrong');
  const fb = document.getElementById(`fb-${qi}`);
  fb.className = 'feedback ' + (ok ? 'correct' : 'wrong');
  fb.textContent = ok ? '✓ Correct!' : `✗ Incorrect. The correct answer is ${correct ? 'True' : 'False'}.`;
}

function updateProgress() {
  const pct = (answered/total)*100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${answered} / ${total} answered`;
}

function showResults() {
  const chScores = {};
  questions.forEach((q,i) => {
    if (!chScores[q.ch]) chScores[q.ch] = {correct:0,total:0,title:q.chTitle};
    chScores[q.ch].total++;
    if (userAnswers[i] === q.ans) chScores[q.ch].correct++;
  });
  let total_correct = 0;
  Object.values(chScores).forEach(c => total_correct += c.correct);
  const pct = Math.round((total_correct/total)*100);

  let grade, color;
  if (pct>=90){grade='A — Excellent';color='#16a34a';}
  else if (pct>=80){grade='B — Good';color='#2563eb';}
  else if (pct>=70){grade='C — Satisfactory';color='#d97706';}
  else if (pct>=60){grade='D — Needs Improvement';color='#ea580c';}
  else{grade='F — Unsatisfactory';color='#dc2626';}

  const panel = document.getElementById('scorePanel');
  panel.style.display = 'block';
  document.getElementById('scoreBig').textContent = pct+'%';
  document.getElementById('scoreSub').textContent = `You answered ${total_correct} out of ${total} questions correctly.`;

  const bd = document.getElementById('scoreBreakdown');
  Object.entries(chScores).forEach(([ch, s]) => {
    const item = document.createElement('div');
    item.className = 'score-item';
    item.innerHTML = `<div class="val">${s.correct}/${s.total}</div><div class="lbl">Chapter ${ch}</div>`;
    bd.appendChild(item);
  });

  const badge = document.getElementById('gradeBadge');
  badge.textContent = grade; badge.style.background = color; badge.style.color='#fff';
  panel.scrollIntoView({behavior:'smooth'});
}

buildExam();
</script>
